spring.application.name=${SPRING_APPLICATION_NAME:mundo-entre-libros-api}

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/mundo_entre_libros_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mel_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:MelPassword123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jackson.time-zone=${SPRING_JACKSON_TIME_ZONE:UTC}

jwt.secret=${JWT_SECRET:mel-super-secret-key-for-development-only-please-change-in-production-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}